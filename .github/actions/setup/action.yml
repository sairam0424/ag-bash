name: "Setup pnpm + Node"
description: >-
  Install pnpm, set up Node with the pnpm store cached, and install
  dependencies with a frozen lockfile. Install-only: callers keep their own
  `checkout` step and run their own build, so this stays shape-agnostic for the
  build-once/fan-out jobs.
inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "22"
  registry-url:
    description: >-
      Optional npm registry URL. Set this only on publish/release jobs so
      setup-node writes the registry to .npmrc for auth/provenance.
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        cache: "pnpm"
    - run: pnpm install --frozen-lockfile
      shell: bash
