name: Nightly Canary
on:
  schedule:
    # Nightly at 03:17 UTC (off-the-hour to dodge cron congestion).
    - cron: "17 3 * * *"
  workflow_dispatch:

# A running nightly should finish, not be cancelled by the next trigger.
concurrency:
  group: canary
  cancel-in-progress: false

permissions: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm --filter @ag-bash/bash test:fuzz:long
      - run: pnpm --filter @ag-bash/bash fuzz:diff
      - name: Upload divergence report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-divergences
          path: packages/bash/fuzz-divergences.json
          if-no-files-found: ignore
          retention-days: 14

  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm --filter @ag-bash/bash test:slow

  audit-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm audit --audit-level=high
