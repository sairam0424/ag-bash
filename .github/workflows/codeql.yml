name: CodeQL
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly off-peak scan (Mondays 04:23 UTC) to catch advisories in code
    # that has not changed but is newly flagged by updated query packs.
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs that need more must opt in explicitly.
permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Minimum scopes for CodeQL: upload SARIF + read repo/workflow metadata.
      # Do NOT broaden these — this repo holds an npm publish credential.
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # `actions` statically flags workflow script-injection, missing
        # permissions, and unpinned actions — high value given the publish cred.
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: "/language:${{ matrix.language }}"
