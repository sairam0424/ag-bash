name: CodeQL
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly off-peak scan (Mondays 04:23 UTC) to catch advisories in code
    # that has not changed but is newly flagged by updated query packs.
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs that need more must opt in explicitly.
permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Minimum scopes for CodeQL: upload SARIF + read repo/workflow metadata.
      # Do NOT broaden these — this repo holds an npm publish credential.
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # `actions` statically flags workflow script-injection, missing
        # permissions, and unpinned actions — high value given the publish cred.
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
