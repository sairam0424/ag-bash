name: Quality
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs that need more must opt in explicitly.
permissions: {}

jobs:
  # Validate every workflow against GitHub's own Actions schema. `yaml.safe_load`
  # only checks YAML syntax — it accepts files GitHub then rejects at startup
  # (e.g. `with:` as a scalar, double-quoted strings inside ${{ }} expressions).
  # actionlint embeds that schema, so this catches "Invalid workflow file" before
  # a push instead of after. Pinned to a release tag + verified via checksum.
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
          # Installer pinned to the v1.7.7 commit SHA (not the moveable tag),
          # matching this repo's SHA-pin-everything supply-chain stance.
          ACTIONLINT_SHA: "03d0035246f3e81f36aed592ffb4bebf33a03106"
        run: |
          installer="$(mktemp)"
          curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SHA}/scripts/download-actionlint.bash" -o "$installer"
          bash "$installer" "${ACTIONLINT_VERSION}"
          ./actionlint -color

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      # Supply-chain gate (E3): audit MUST fail the build on high/critical
      # advisories. Do NOT add continue-on-error here — that silently masks
      # vulnerable transitive dependencies. Pin patched versions via the
      # pnpm.overrides block in the root package.json when an advisory lands.
      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm --filter @ag-bash/bash knip
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm --filter @ag-bash/bash check:worker-sync
      # Packaging guards (release-integrity): versions stay synchronized and the
      # packed tarballs carry their load-bearing artifacts with no workspace:
      # leak. Cheap; catches the v6.0.0/v6.0.2 packaging-defect classes on PRs.
      - run: pnpm check:version-sync
      - run: pnpm check:pack-contents
