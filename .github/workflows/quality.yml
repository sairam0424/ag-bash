name: Quality
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Supply-chain gate (E3): audit MUST fail the build on high/critical
      # advisories. Do NOT add continue-on-error here — that silently masks
      # vulnerable transitive dependencies. Pin patched versions via the
      # pnpm.overrides block in the root package.json when an advisory lands.
      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm --filter @ag-bash/bash knip
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm --filter @ag-bash/bash check:worker-sync
